<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d080;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#d4af57;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a8874a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af57;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#d4af57;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#d4af57;stop-opacity:0.3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#d4af57" stroke-width="1" opacity="0.2"/>
  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#arcGrad)" stroke-width="1.5"
    stroke-dasharray="200 115" stroke-dashoffset="-20" opacity="0.6"/>

  <!-- Arc / aurora curve -->
  <path d="M 18,78 Q 60,10 102,78"
    fill="none" stroke="url(#goldGrad)" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Left node -->
  <circle cx="18" cy="78" r="4.5" fill="#d4af57" filter="url(#glow)"/>
  <circle cx="18" cy="78" r="8" fill="none" stroke="#d4af57" stroke-width="0.8" opacity="0.4"/>

  <!-- Top / center node (apex) -->
  <circle cx="60" cy="26" r="6" fill="url(#goldGrad)" filter="url(#softglow)"/>
  <circle cx="60" cy="26" r="11" fill="none" stroke="#d4af57" stroke-width="0.8" opacity="0.3"/>
  <circle cx="60" cy="26" r="16" fill="none" stroke="#d4af57" stroke-width="0.5" opacity="0.15"/>

  <!-- Right node -->
  <circle cx="102" cy="78" r="4.5" fill="#d4af57" filter="url(#glow)"/>
  <circle cx="102" cy="78" r="8" fill="none" stroke="#d4af57" stroke-width="0.8" opacity="0.4"/>

  <!-- Triangle connection lines -->
  <line x1="18" y1="78" x2="60" y2="26" stroke="#d4af57" stroke-width="0.8" opacity="0.25"/>
  <line x1="60" y1="26" x2="102" y2="78" stroke="#d4af57" stroke-width="0.8" opacity="0.25"/>
  <line x1="18" y1="78" x2="102" y2="78" stroke="#d4af57" stroke-width="1.5" opacity="0.35" stroke-linecap="round"/>

  <!-- Horizontal base line -->
  <line x1="8" y1="78" x2="112" y2="78" stroke="url(#arcGrad)" stroke-width="1" opacity="0.5"/>

  <!-- Small inner dots -->
  <circle cx="60" cy="78" r="2.5" fill="#d4af57" opacity="0.7"/>
  <circle cx="39" cy="52" r="1.8" fill="#d4af57" opacity="0.45"/>
  <circle cx="81" cy="52" r="1.8" fill="#d4af57" opacity="0.45"/>
</svg>
